apiVersion: apps/v1
kind: Deployment
metadata:
  name: scribebot
  namespace: discord-bots
  labels:
    app: scribebot
    language: python
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scribebot
  template:
    metadata:
      labels:
        app: scribebot
        language: python
    spec:
      containers:
        - name: scribebot
          image: localhost:5000/scribebot:latest
          imagePullPolicy: Always
          env:
            - name: COCKROACH_DB_URL
              valueFrom:
                secretKeyRef:
                  name: cockroach-db-secret
                  key: connect-string
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: scribebot-secret
                  key: token
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "300m"
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: scribebot
  namespace: discord-bots
spec:
  selector:
    app: scribebot
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: andybot
  namespace: discord-bots
  labels:
    app: andybot
    language: go
spec:
  replicas: 1
  selector:
    matchLabels:
      app: andybot
  template:
    metadata:
      labels:
        app: andybot
        language: go
    spec:
      containers:
        - name: andybot
          image: localhost:5000/andybot:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cockroach-db-secret
                  key: connect-string
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: andybot-secret
                  key: token
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "200m"
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: andybot
  namespace: discord-bots
spec:
  selector:
    app: andybot
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

# VaultStaticSecret resources for Node.js bots
# These sync secrets from Vault KV-v2 into Kubernetes Secrets
# that the existing bot deployments already reference.
#
# Vault path: secret/discord-bots/<botname>
# K8s secret: <botname>-secret (with key: auth.json)
#
# All Node.js bots use auth.json files containing a JSON object
# with token and clientId fields.
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: owobot-vault-secret
  namespace: discord-bots
  labels:
    app: owobot
    language: nodejs
    app.kubernetes.io/managed-by: vault-secrets-operator
spec:
  vaultAuthRef: vault-auth
  mount: secret
  type: kv-v2
  path: discord-bots/owobot
  refreshAfter: 60s
  destination:
    name: owobot-secret
    create: true
    labels:
      app: owobot
      language: nodejs
    overwrite: true
    transformation:
      excludeRaw: true
      templates:
        auth.json:
          text: |
            {
              "token": "{{ .Secrets.token }}",
              "clientId": "{{ .Secrets.clientId }}"
            }

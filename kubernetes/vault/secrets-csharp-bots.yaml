# VaultStaticSecret resources for C# bots
# These sync secrets from Vault KV-v2 into Kubernetes Secrets
# that the existing bot deployments already reference.
#
# Vault path: secret/discord-bots/<botname>
# some bots use auth.txt
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: braincellbot-vault-secret
  namespace: discord-bots
  labels:
    app: braincellbot
    language: csharp
    app.kubernetes.io/managed-by: vault-secrets-operator
spec:
  vaultAuthRef: vault-auth
  mount: secret
  type: kv-v2
  path: discord-bots/braincellbot
  refreshAfter: 60s
  destination:
    name: braincellbot-secret
    create: true
    labels:
      app: braincellbot
      language: csharp
    overwrite: true
    transformation:
      excludeRaw: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: dickjohnson-vault-secret
  namespace: discord-bots
  labels:
    app: dickjohnson
    language: csharp
    app.kubernetes.io/managed-by: vault-secrets-operator
spec:
  vaultAuthRef: vault-auth
  mount: secret
  type: kv-v2
  path: discord-bots/dickjohnson
  refreshAfter: 60s
  destination:
    name: dickjohnson-secret
    create: true
    labels:
      app: dickjohnson
      language: csharp
    overwrite: true
    transformation:
      excludeRaw: true
      templates:
        auth.txt:
          text: "{{ .Secrets.token }}"

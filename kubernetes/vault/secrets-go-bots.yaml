# VaultStaticSecret resources for Go bots
# These sync secrets from Vault KV-v2 into Kubernetes Secrets
# that the existing bot deployments already reference.
#
# Vault path: secret/discord-bots/<botname>
# K8s secret: <botname>-secret (with key: auth.txt)
#
# All Go bots use auth.txt files containing the Discord bot token.
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: andybot-vault-secret
  namespace: discord-bots
  labels:
    app: andybot
    language: go
    app.kubernetes.io/managed-by: vault-secrets-operator
spec:
  vaultAuthRef: vault-auth
  mount: secret
  type: kv-v2
  path: discord-bots/andybot
  refreshAfter: 60s
  destination:
    name: andybot-secret
    create: true
    labels:
      app: andybot
      language: go
    overwrite: true
    transformation:
      excludeRaw: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: piratebot-vault-secret
  namespace: discord-bots
  labels:
    app: piratebot
    language: go
    app.kubernetes.io/managed-by: vault-secrets-operator
spec:
  vaultAuthRef: vault-auth
  mount: secret
  type: kv-v2
  path: discord-bots/piratebot
  refreshAfter: 60s
  destination:
    name: piratebot-secret
    create: true
    labels:
      app: piratebot
      language: go
    overwrite: true
    transformation:
      excludeRaw: true
      templates:
        auth.txt:
          text: "{{ .Secrets.token }}"
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: wsb-vault-secret
  namespace: discord-bots
  labels:
    app: wsb
    language: go
    app.kubernetes.io/managed-by: vault-secrets-operator
spec:
  vaultAuthRef: vault-auth
  mount: secret
  type: kv-v2
  path: discord-bots/wsb
  refreshAfter: 60s
  destination:
    name: wsb-secret
    create: true
    labels:
      app: wsb
      language: go
    overwrite: true
    transformation:
      excludeRaw: true
      templates:
        auth.txt:
          text: "{{ .Secrets.token }}"

# VaultStaticSecret resources for Python bots
# These sync secrets from Vault KV-v2 into Kubernetes Secrets
# that the existing bot deployments already reference.
#
# Vault path: secret/discord-bots/<botname>
# K8s secret: <botname>-secret (with key: auth.txt)
#
# All Python bots use auth.txt files containing the Discord bot token.
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: scribebot-vault-secret
  namespace: discord-bots
  labels:
    app: scribebot
    language: python
    app.kubernetes.io/managed-by: vault-secrets-operator
spec:
  vaultAuthRef: vault-auth
  mount: secret
  type: kv-v2
  path: discord-bots/scribebot
  refreshAfter: 60s
  destination:
    name: scribebot-secret
    create: true
    labels:
      app: scribebot
      language: python
    overwrite: true
    transformation:
      excludeRaw: true
---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: purpleharobot-vault-secret
  namespace: discord-bots
  labels:
    app: purpleharobot
    language: python
    app.kubernetes.io/managed-by: vault-secrets-operator
spec:
  vaultAuthRef: vault-auth
  mount: secret
  type: kv-v2
  path: discord-bots/purpleharobot
  refreshAfter: 60s
  destination:
    name: purpleharobot-secret
    create: true
    labels:
      app: purpleharobot
      language: python
    overwrite: true
    transformation:
      excludeRaw: true
      templates:
        auth.txt:
          text: "{{ .Secrets.token }}"
